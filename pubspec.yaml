name: neu_khata
description: "Khata Digital - A digital ledger for small businesses in Pakistan"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Database (Offline-first)
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1

  # UI & Design
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  lottie: ^3.3.1
  cupertino_icons: ^1.0.8

  # Utilities
  intl: ^0.20.2
  path_provider: ^2.1.5
  shared_preferences: ^2.5.4
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/svg/
    - assets/lottie/
    - assets/images/
